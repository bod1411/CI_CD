name: Deploy Snowflake Objects

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  deploy:
    if: github.event.pull_request.merged == true

    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_ACCOUNT:  ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER:     ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Snowflake connector
        run: pip install snowflake-connector-python

      - name: Deploy all Snowflake objects
        run: |
          python - <<'EOF'
          import snowflake.connector
          import os
          import glob
          import re

          conn = snowflake.connector.connect(
              account  = os.environ["SNOWFLAKE_ACCOUNT"],
              user     = os.environ["SNOWFLAKE_USER"],
              password = os.environ["SNOWFLAKE_PASSWORD"],
          )
          cur = conn.cursor()

          OBJECT_ORDER = [
              "APP_PULSE/US/DDL/01_database",
              "APP_PULSE/US/DDL/02_schema",
              "APP_PULSE/US/DDL/03_tables",
              "APP_PULSE/US/DDL/04_functions",
              "APP_PULSE/US/DDL/05_views",
              "APP_PULSE/US/DDL/06_procedures",
              "APP_PULSE/US/DDL/07_streamlit",
              "APP_PULSE/US/DDL/08_notebooks",
              "APP_PULSE/US/DML",
              "APP_PULSE/UK/DDL/01_database",
              "APP_PULSE/UK/DDL/02_schema",
              "APP_PULSE/UK/DDL/03_tables",
              "APP_PULSE/UK/DDL/04_functions",
              "APP_PULSE/UK/DDL/05_views",
              "APP_PULSE/UK/DDL/06_procedures",
              "APP_PULSE/UK/DDL/07_streamlit",
              "APP_PULSE/UK/DDL/08_notebooks",
              "APP_PULSE/UK/DML",
              "WP4P/ZENDESK/DDL/01_database",
              "WP4P/ZENDESK/DDL/02_schema",
              "WP4P/ZENDESK/DDL/03_tables",
              "WP4P/ZENDESK/DDL/04_functions",
              "WP4P/ZENDESK/DDL/05_views",
              "WP4P/ZENDESK/DDL/06_procedures",
              "WP4P/ZENDESK/DDL/07_streamlit",
              "WP4P/ZENDESK/DDL/08_notebooks",
              "WP4P/ZENDESK/DML",
              "WP4P/DOCEBO/DDL/01_database",
              "WP4P/DOCEBO/DDL/02_schema",
              "WP4P/DOCEBO/DDL/03_tables",
              "WP4P/DOCEBO/DDL/04_functions",
              "WP4P/DOCEBO/DDL/05_views",
              "WP4P/DOCEBO/DDL/06_procedures",
              "WP4P/DOCEBO/DDL/07_streamlit",
              "WP4P/DOCEBO/DDL/08_notebooks",
              "WP4P/DOCEBO/DML",
          ]

          total_executed = 0
          total_skipped  = 0

          for folder in OBJECT_ORDER:
              sql_files = sorted(glob.glob(f"{folder}/*.sql"))

              if folder.rstrip('/').endswith('DML'):
                  filtered = [p for p in sql_files if re.match(r'^\d+_', os.path.basename(p))]
                  skipped_count = len(sql_files) - len(filtered)
                  if skipped_count:
                      print(f"  [INFO] Skipping {skipped_count} DML file(s) not matching naming convention in {folder}")
                      total_skipped += skipped_count
                  sql_files = filtered

              if not sql_files:
                  print(f"[SKIP] No .sql files found in: {folder}")
                  continue

              print(f"\n{'='*60}")
              print(f"Processing: {folder} ({len(sql_files)} file(s))")
              print(f"{'='*60}")

              for filepath in sql_files:
                  with open(filepath, "r") as f:
                      sql = f.read().strip()

                  if not sql:
                      print(f"  [SKIP] Empty file: {filepath}")
                      total_skipped += 1
                      continue

                  try:
                      print(f"  -> Executing: {os.path.basename(filepath)}")

                      if '$$' in sql:
                          statements = [sql]
                      else:
                          statements = [s.strip() for s in sql.split(';') if s.strip()]

                      for statement in statements:
                          cur.execute(statement)
                      print(f"     OK - Success ({len(statements)} statement(s))")
                      total_executed += 1
                  except Exception as e:
                      print(f"     FAILED: {filepath}")
                      print(f"     Error: {e}")
                      cur.close()
                      conn.close()
                      raise SystemExit(1)

          cur.close()
          conn.close()

          print(f"\n{'='*60}")
          print(f"Deployment complete!")
          print(f"  Executed : {total_executed} file(s)")
          print(f"  Skipped  : {total_skipped} file(s)")
          print(f"{'='*60}")
          EOF